# Railway/Nixpacks — força `npm run build` (tsc) antes do container subir
# Root Directory do serviço: api
# O comando de start continua vindo das Settings de cada serviço (api vs worker).

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]
